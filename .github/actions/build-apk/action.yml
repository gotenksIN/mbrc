name: Build Android Variant

inputs:
  task:
    description: Gradle task to execute
    required: true
  artifact-name:
    description: Artifact name for uploaded APKs
    required: true
  artifact-path:
    description: Artifact path or glob to upload
    required: true

runs:
  using: composite
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: "21"
        distribution: temurin

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Build with Gradle
      shell: bash
      run: ./gradlew ${{ inputs.task }} --no-daemon

    - name: Upload APK artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}
