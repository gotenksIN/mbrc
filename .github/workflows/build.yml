name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build assembleGithubDebug
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build assembleGithubDebug
        uses: ./.github/actions/build-apk
        with:
          task: assembleGithubDebug
          artifact-name: app-github-debug
          artifact-path: app/build/outputs/apk/github/debug/*.apk
          keystore-base64: ${{ secrets.CI_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.CI_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.CI_KEY_ALIAS }}
          key-password: ${{ secrets.CI_KEY_PASSWORD }}
